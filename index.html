<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warfare</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/warfare.css">
</head>
<body>
    <!-- Menu Bar -->
    <div id="menuBar">
        <button id="btnNew">New</button>
        <button id="btnOpen" disabled>Open</button>
        <button id="btnSave" disabled>Save</button>
        <button id="btnOptions" disabled>Options</button>
        <button id="btnInvest" disabled>Invest</button>
        <button id="btnList" disabled>List</button>
        <button id="btnOrders" disabled>Orders</button>
        <button id="btnMap" disabled>Map</button>
        <button id="btnReports" disabled>Reports</button>
        <button id="btnSectors" disabled>Sectors</button>
        <div class="spacer"></div>
        <button id="btnEndTurn" class="primary">End Turn</button>
    </div>

    <!-- Game Canvas -->
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- Info Panel (right side) — shows city + units at selected hex -->
        <div id="infoPanel">
            <button class="close-btn" id="closeInfoPanel">&times;</button>

            <!-- City section (shown when a city is at selected hex) -->
            <div id="citySection" style="display:none">
                <h3 id="cityName">City Name</h3>
                <div class="stat-row">
                    <span class="stat-label">Owner:</span>
                    <span class="stat-value" id="cityOwner">Neutral</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Population:</span>
                    <span class="stat-value" id="cityPop">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Knowledge:</span>
                    <span class="stat-value" id="cityKnowledge">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Defense:</span>
                    <span class="stat-value" id="cityDefense">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Economics:</span>
                    <span class="stat-value" id="cityEconomics">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Satisfaction:</span>
                    <span class="stat-value" id="citySatisfaction">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Garrison:</span>
                    <span class="stat-value" id="cityGarrison">0</span>
                </div>
                <div class="city-overview">
                    <h4>City Rating</h4>
                    <div class="overview-rating">
                        <span class="rating-grade" id="cityGrade">A</span>
                        <span class="rating-score" id="cityScore">0</span>
                    </div>
                    <div class="overview-summary" id="citySummary">Balanced city</div>
                </div>
                <div id="recruitBtnWrap"></div>
            </div>

            <!-- Units section (shown when units are at selected hex) -->
            <div id="unitsSection" style="display:none">
                <h4>Units Here</h4>
                <div id="unitsList"></div>
            </div>
        </div>
    </div>

    <!-- New Game Dialog -->
    <div id="newGameOverlay" class="dialog-overlay" style="display:none">
        <div class="dialog-box" id="newGameDialog">
            <h2>New Game</h2>
            <div class="dialog-field">
                <span class="field-label">AI Opponents:</span>
                <div class="radio-group" id="ngOpponents">
                    <label><input type="radio" name="opponents" value="1" checked> 1</label>
                    <label><input type="radio" name="opponents" value="2"> 2</label>
                    <label><input type="radio" name="opponents" value="3"> 3</label>
                </div>
            </div>
            <div class="dialog-field" id="ngPersonalityField">
                <label for="ngPersonality">AI Personality:</label>
                <select id="ngPersonality">
                    <option value="GENTEEL">Genteel — cautious, economic</option>
                    <option value="AGGRESSIVE" selected>Aggressive — military focus</option>
                    <option value="INSANE">Insane — reckless, maximum aggression</option>
                    <option value="BENEVOLENT">Benevolent — development focus</option>
                </select>
            </div>
            <div class="dialog-field" id="ngMultiPersonalityNote" style="display:none">
                <span class="field-label">AI Personalities:</span>
                <span class="note">Each opponent gets a different personality automatically</span>
            </div>
            <div class="dialog-field">
                <span class="field-label">Map Size:</span>
                <span class="note" id="ngMapSize">60 × 45 — 50 cities, 5 regions</span>
            </div>
            <div class="dialog-buttons">
                <button id="ngCancel" class="btn-secondary">Cancel</button>
                <button id="ngStart" class="btn-primary">Start Game</button>
            </div>
        </div>
    </div>

    <!-- Notification Toasts -->
    <div id="notificationArea"></div>

    <!-- Status Bar -->
    <div id="statusBar">Ready</div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
